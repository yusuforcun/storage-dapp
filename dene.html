<!DOCTYPE html>
<html>
<head>
    <title>SON DENEME</title>
</head>
<body>
    <h1>STORAGE DAPP</h1>
    <div id="sonuc" style="font-size:24px;margin:20px;">bekle...</div>
    <button onclick="baglan()">BAĞLAN</button>

    <script>
        async function baglan() {
            // SADECE METHAMASK VAR MI KONTROL ET
            if (!window.ethereum) {
                document.getElementById("sonuc").innerHTML = "METAMASK YOK";
                return;
            }
            
            // METAMASK BAĞLAN
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            // DOĞRUDAN CONTRACT'A SOR - HARDCODE
            const cevap = await fetch("https://api.etherscan.io/api?module=contract&action=getabi&address=0x0fC5025C764cE34df352757e82f7B5c4Df39A836");
            
            document.getElementById("sonuc").innerHTML = "BAĞLANTI BAŞARILI";
        }
        
        baglan();
    </script>
</body>
</html>
